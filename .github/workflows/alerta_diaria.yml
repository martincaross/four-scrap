name: Publicador NextPlan

on:
  schedule:
    - cron: '0 15 * * *'  # 17:00 hora de Madrid
  workflow_dispatch:      # Botón de pruebas manuales

# 🔐 CLAVE: Permitir que el robot guarde archivos (el index.html) en tu repositorio
permissions:
  contents: write

jobs:
  run_pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Lanzar Publicadores de Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID_CHATS: ${{ secrets.TELEGRAM_SECRET_CHATS }}
          TELEGRAM_CHAT_ID_SOCIAL: ${{ secrets.TELEGRAM_SECRET_SOCIAL }}
          MINUTOS_ESPACIADO: 0
        run: |
          python automation/publicador_chats.py &
          python automation/publicador_social.py &
          wait

      - name: Generar clon de Linktree
        run: python automation/generar_linktree.py

      - name: Auto-subir cambios al repositorio
        run: |
          git config --global user.name "NextPlan Bot"
          git config --global user.email "bot@nextplan.es"
          git add index.html
          # Solo hace commit si el archivo ha cambiado para evitar errores
          git diff-index --quiet HEAD || git commit -m "chore: actualizar linktree automatizado"
          git push origin main