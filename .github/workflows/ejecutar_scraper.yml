name: Automatizacion Scraper Fourvenues

on:
  workflow_dispatch: # Esto permite que puedas activar el robot manualmente con un botón

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno Python
      uses: actions/setup-python@v5
      with:
        python_version: '3.10'

    - name: Instalar librerías requeridas
      run: |
        pip install requests beautifulsoup4

    - name: Ejecutar script extractor
      run: python scraper.py

    - name: Guardar y empaquetar JSON generado
      uses: actions/upload-artifact@v4
      with:
        name: datos-descargables-evento
        path: evento.json