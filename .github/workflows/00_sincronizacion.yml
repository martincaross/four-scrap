name: 🌐 00. Sincronización Web y Base de Datos

on:
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC = 00:00h Madrid
  workflow_dispatch:      # Botón de pruebas manuales

permissions:
  contents: write

jobs:
  sincronizar_bunker:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 urllib3

      - name: 1. Rastrear eventos nuevos (Landing Fourvenues)
        env:
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
        run: python scraper_events.py

      - name: 2. Extraer datos de eventos y actualizar JSON
        env:
          ZENROWS_API_KEY: ${{ secrets.ZENROWS_API_KEY }}
        run: python scraper.py

      - name: 3. Generar clon de Linktree para GitHub Pages
        run: python automation/generar_linktree.py

      - name: 4. Auto-subir base de datos y web actualizadas a GitHub
        run: |
          git config --global user.name "NextPlan Bot"
          git config --global user.email "bot@nextplan.es"
          git add base_de_datos_madrid.json urls.txt index.html
          git diff-index --quiet HEAD || git commit -m "chore: actualización nocturna de eventos, JSON y web"
          git push origin main